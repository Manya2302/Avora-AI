version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securevault}
      POSTGRES_USER: ${POSTGRES_USER:-svuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sv_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── MinIO (Object Storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sv_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Qdrant (Vector DB) ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sv_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Ollama (Local AI) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sv_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Django Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sv_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn securevault.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-svuser}:${POSTGRES_PASSWORD:-svpass123}@postgres:5432/${POSTGRES_DB:-securevault}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sv_celery_worker
    restart: unless-stopped
    command: celery -A securevault worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-svuser}:${POSTGRES_PASSWORD:-svpass123}@postgres:5432/${POSTGRES_DB:-securevault}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  # ── Celery Beat (Scheduler) ───────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sv_celery_beat
    restart: unless-stopped
    command: celery -A securevault beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  # ── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sv_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  ollama_data:
  static_files:
  media_files:

  # ── Qdrant UI (Phase 2) ───────────────────────────────────────
  # Access Qdrant dashboard: http://localhost:6333/dashboard
  # Access MinIO console:    http://localhost:9001
  # Access API docs:         http://localhost:8000/api/docs/
